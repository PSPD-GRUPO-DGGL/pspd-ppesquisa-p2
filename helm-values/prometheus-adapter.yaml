prometheus:
  url: http://prometheus-kube-prometheus-prometheus.monitoring.svc
  port: 9090
  path: ""

rules:
  default: true
  custom:
  - seriesQuery: 'http_request_duration_seconds_count{namespace!="",pod!=""}'
    resources:
      overrides:
        namespace: { resource: "namespace" }
        pod: { resource: "pod" }
    name:
      matches: "^(.*)_seconds_count"
      as: "${1}_per_second"
    metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[1m])) by (<<.GroupBy>>)'