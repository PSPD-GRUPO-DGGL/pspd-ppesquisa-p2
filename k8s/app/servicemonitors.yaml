# CRÍTICO: o `label` abaixo tem que casar com o `serviceMonitorSelector` do
# Prometheus Operator do professor, senão o ServiceMonitor existe e NADA é raspado.
# Descobrir com:
#   kubectl get prometheus -A -o jsonpath='{.items[0].spec.serviceMonitorSelector}'
# e trocar `release: kube-prometheus-stack` pelo valor real.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: auth-service
  namespace: grupo-9
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: auth-service
  endpoints:
  - port: metrics
    interval: 15s
---
