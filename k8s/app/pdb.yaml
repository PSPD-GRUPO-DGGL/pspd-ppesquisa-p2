# Mantém ao menos 1 pod de cada serviço durante evicções voluntárias.
# (Não bloqueia `kubectl delete pod` do experimento de resiliência.)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service
  namespace: grupo-9
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: data-service
  namespace: grupo-9
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: data-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: transform-service
  namespace: grupo-9
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: transform-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway
  namespace: grupo-9
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
