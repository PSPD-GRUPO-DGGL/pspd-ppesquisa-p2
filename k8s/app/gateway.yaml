apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: grupo-9
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: gateway
        image: seu-usuario-docker/pspd-gateway:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: "150m"
            memory: "96Mi"
          limits:
            cpu: "400m"
            memory: "192Mi"
        env:
        - name: AUTH_SERVICE_URL
          value: "auth-service:50051"
        - name: DATA_SERVICE_URL
          value: "data-service:50051"
        - name: TRANSFORM_SERVICE_URL
          value: "transform-service:50051"
        - name: KEYCLOAK_URL
          value: "https://kiriland.unb.br/keycloak"
        - name: KEYCLOAK_REALM
          value: "grupo09"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: grupo-9
spec:
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: api-gateway