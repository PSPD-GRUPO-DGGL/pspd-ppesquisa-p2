# HPAs recalibrados para caber na cota do namespace (limits 6 CPU / 7Gi).
# Ver a tabela em docs/PLANO.md. Todo alvo precisa de requests.cpu, senão o HPA
# reporta <unknown> e nunca escala.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service
  namespace: grupo-9
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
---
