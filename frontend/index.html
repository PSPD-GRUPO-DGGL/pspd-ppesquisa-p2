<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PseudoPEP — Grupo 09</title>
  <!-- Versão fixada para não descasar da versão do Keycloak do professor. -->
  <script src="https://cdn.jsdelivr.net/npm/keycloak-js@24.0.5/dist/keycloak.min.js"></script>
  <style>
    body { font-family: system-ui, Arial, sans-serif; padding: 20px; max-width: 860px; margin: 0 auto; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    .painel { padding: 20px; border: 1px solid #ccc; border-radius: 8px; background: #fafafa; margin-top: 12px; }
    .oculto { display: none; }
    label { display: block; margin: 10px 0 4px; font-size: 0.9rem; font-weight: 600; }
    input { padding: 8px; width: 260px; max-width: 100%; border: 1px solid #bbb; border-radius: 4px; }
    button { padding: 9px 14px; margin: 8px 6px 0 0; cursor: pointer; background: #0056b3; color: #fff; border: 0; border-radius: 4px; }
    button:hover { background: #004494; }
    #logout-btn { background: #6c757d; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; background: #0056b3; color: #fff; font-size: 0.8rem; }
    #resultado { background: #f4f4f4; padding: 12px; margin-top: 16px; border-radius: 5px; border: 1px solid #ddd; }
    #resumo { font-weight: 600; margin-bottom: 8px; }
    pre { white-space: pre-wrap; word-break: break-word; max-height: 420px; overflow: auto; margin: 0; font-size: 0.82rem; }
    .erro { color: #b02a37; }
  </style>
</head>
<body>
  <h1>PseudoPEP — Prontuários do Hospital Universitário (Grupo 09)</h1>

  <div id="painel-deslogado" class="painel">
    <p>Faça login no Keycloak da disciplina para acessar o sistema.</p>
    <button onclick="login()">Entrar com Keycloak</button>
  </div>

  <div id="painel-logado" class="painel oculto">
    <p><span id="boas-vindas"></span> <span id="perfil-badge" class="badge"></span></p>

    <div id="area-paciente" class="oculto">
      <label for="pac">ID do paciente</label>
      <input id="pac" placeholder="P090000002">
      <div><button onclick="consultarPaciente()">Consultar prontuário</button></div>
    </div>

    <div id="area-pesquisador" class="oculto">
      <label for="projeto">Projeto</label>
      <input id="projeto" value="PRJ01_G09">
      <label for="condicao">Condição</label>
      <input id="condicao" value="DIABETES">
      <div>
        <button onclick="consultarEstatisticas()">Estatísticas da coorte</button>
        <button onclick="consultarExames()">Exames anonimizados</button>
        <button onclick="consultarProjetos()">Meus projetos</button>
      </div>
    </div>

    <div><button id="logout-btn" onclick="logout()">Sair</button></div>

    <div id="resultado">
      <div id="resumo">A resposta do pipeline (Auth → Data → Transform) aparece aqui.</div>
      <pre id="corpo"></pre>
    </div>
  </div>

  <script>
    // Ajuste estes valores ao ambiente. clientId DEVE ser o mesmo usado pelo k6/gateway.
    const CONFIG = {
      url: 'https://kiriland.unb.br/keycloak',
      realm: 'grupo09',
      clientId: 'frontend',
      // Vazio = deriva da URL da página (mesma origem do gateway, atrás do Ingress).
      // Em dev separado, aponte para o gateway, ex. 'http://localhost:3000/'.
      apiBase: '',
    };

    // Diretório da página atual, com barra final: resolve a API sob qualquer prefixo.
    function baseApi() { return CONFIG.apiBase || location.pathname.replace(/[^/]*$/, ''); }

    const keycloak = new Keycloak({ url: CONFIG.url, realm: CONFIG.realm, clientId: CONFIG.clientId });

    keycloak.init({ onLoad: 'check-sso', checkLoginIframe: false, pkceMethod: 'S256' })
      .then((autenticado) => { if (autenticado) montarUI(); })
      .catch(() => alert('Falha ao inicializar o Keycloak da UnB.'));

    function login() { keycloak.login(); }
    function logout() { keycloak.logout(); }

    const PERFIS = ['MEDICO', 'ESTAGIARIO', 'PESQUISADOR'];
    function resolverPerfil() {
      const roles = (keycloak.tokenParsed.realm_access && keycloak.tokenParsed.realm_access.roles) || [];
      const achado = roles.map((r) => r.toUpperCase()).find((r) => PERFIS.includes(r));
      if (achado) return achado;
      const u = keycloak.tokenParsed.preferred_username || '';
      if (u.startsWith('med.')) return 'MEDICO';
      if (u.startsWith('est.')) return 'ESTAGIARIO';
      if (u.startsWith('pes.')) return 'PESQUISADOR';
      return 'DESCONHECIDO';
    }

    function montarUI() {
      document.getElementById('painel-deslogado').classList.add('oculto');
      document.getElementById('painel-logado').classList.remove('oculto');
      const perfil = resolverPerfil();
      document.getElementById('boas-vindas').textContent = `Olá, ${keycloak.tokenParsed.preferred_username}.`;
      document.getElementById('perfil-badge').textContent = perfil;
      if (perfil === 'MEDICO' || perfil === 'ESTAGIARIO') {
        document.getElementById('area-paciente').classList.remove('oculto');
      } else if (perfil === 'PESQUISADOR') {
        document.getElementById('area-pesquisador').classList.remove('oculto');
      }
    }

    async function chamarGateway(caminho) {
      const resumo = document.getElementById('resumo');
      const corpo = document.getElementById('corpo');
      resumo.className = '';
      resumo.textContent = 'Consultando…';
      corpo.textContent = '';
      try {
        await keycloak.updateToken(30); // renova se faltar <30s para expirar
        const resp = await fetch(baseApi() + caminho, {
          headers: { Authorization: `Bearer ${keycloak.token}` },
        });
        const texto = await resp.text();
        let json;
        try { json = JSON.parse(texto); } catch (_) { json = texto; }
        if (!resp.ok) {
          resumo.className = 'erro';
          resumo.textContent = `HTTP ${resp.status}` + (json && json.motivo ? ` — ${json.motivo}` : '');
          corpo.textContent = typeof json === 'string' ? json : JSON.stringify(json, null, 2);
          return;
        }
        const tipo = json.resourceType || 'resposta';
        const n = Array.isArray(json.entry) ? ` — ${json.entry.length} recursos` : '';
        resumo.textContent = `${tipo}${n}`;
        corpo.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        resumo.className = 'erro';
        resumo.textContent = 'Falha ao comunicar com o Gateway: ' + err.message;
      }
    }

    function consultarPaciente() {
      const id = document.getElementById('pac').value.trim();
      if (!id) return alert('Informe o ID do paciente.');
      chamarGateway(`api/pacientes/${encodeURIComponent(id)}/resumo-clinico`);
    }
    function paramsCoorte() {
      const p = encodeURIComponent(document.getElementById('projeto').value.trim());
      const c = encodeURIComponent(document.getElementById('condicao').value.trim());
      return `projeto=${p}&condicao=${c}`;
    }
    function consultarEstatisticas() { chamarGateway(`api/coortes/estatisticas?${paramsCoorte()}`); }
    function consultarExames() { chamarGateway(`api/coortes/exames?${paramsCoorte()}&limite=100`); }
    function consultarProjetos() { chamarGateway('api/projetos'); }
  </script>
</body>
</html>
