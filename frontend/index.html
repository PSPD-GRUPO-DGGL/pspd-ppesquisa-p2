<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PseudoPEP - Grupo 09</title>
    <!-- Adaptador oficial do Keycloak importado via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/keycloak-js@latest/dist/keycloak.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto;
        }
        h1 { color: #333; }
        button { 
            padding: 10px 15px; 
            margin: 5px 0; 
            cursor: pointer; 
            background-color: #0056b3; 
            color: white; 
            border: none; 
            border-radius: 4px;
        }
        button:hover { background-color: #004494; }
        #logout-btn { background-color: #dc3545; }
        #logout-btn:hover { background-color: #c82333; }
        #resultado { 
            background: #f4f4f4; 
            padding: 15px; 
            margin-top: 20px; 
            border-radius: 5px; 
            white-space: pre-wrap; 
            border: 1px solid #ddd;
            min-height: 100px;
        }
        .painel { padding: 20px; border: 1px solid #ccc; border-radius: 8px; background-color: #fafafa; }
    </style>
</head>
<body>
    <h1>PseudoPEP - Sistema de Prontuários (Grupo 09)</h1>
    
    <!-- Tela mostrada antes do login -->
    <div id="painel-deslogado" class="painel">
        <h3>Acesso Restrito</h3>
        <p>Por favor, faça o login no servidor da disciplina para acessar o sistema.</p>
        <button onclick="login()">Entrar com Keycloak</button>
    </div>

    <!-- Tela mostrada após o login bem-sucedido -->
    <div id="painel-logado" class="painel" style="display:none;">
        <h3 id="boas-vindas"></h3>
        <button onclick="buscarDados()">Consultar Prontuários</button>
        <button id="logout-btn" onclick="logout()">Sair</button>
        <div id="resultado">Os dados da orquestração (Auth -> Data -> Transform) aparecerão aqui...</div>
    </div>

    <script>
        // 1. Configuração apontando para o servidor OAUTH2 do Professor (Grupo 09)
        const keycloak = new Keycloak({
            url: 'https://kiriland.unb.br/keycloak',
            realm: 'grupo09',
            clientId: 'pseudopep' // <-- Alterado para o nome principal do projeto
        });

        // 2. Inicializa o Keycloak e desativa o iframe para evitar bloqueio do localhost
        keycloak.init({ 
            onLoad: 'check-sso',
            checkLoginIframe: false 
        }).then(function(authenticated) {
            if (authenticated) {
                // Se estiver autenticado, esconde a tela de login e mostra o painel
                document.getElementById('painel-deslogado').style.display = 'none';
                document.getElementById('painel-logado').style.display = 'block';
                document.getElementById('boas-vindas').innerText = `Olá, ${keycloak.tokenParsed.preferred_username}!`;
            }
        }).catch(function() {
            alert('Falha ao inicializar a comunicação com o Keycloak da UnB.');
        });

        // 3. Funções de Login e Logout que redirecionam para o servidor do professor
        function login() { keycloak.login(); }
        function logout() { keycloak.logout(); }

        // 4. Bate no seu API Gateway enviando o Token JWT
        function buscarDados() {
            const painelResultado = document.getElementById('resultado');
            painelResultado.innerText = "Buscando dados no pipeline gRPC...\nOrquestração: Gateway -> Auth -> Data -> Transform...";
            
            // Faz a requisição para o seu server.js (Gateway)
            fetch('http://localhost:3000/api/consultar-dados', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + keycloak.token
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // Imprime o JSON formatado bonitinho na tela
                painelResultado.innerText = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                painelResultado.innerText = 'Erro na comunicação com o API Gateway (localhost:3000):\n' + error.message;
            });
        }
    </script>
</body>
</html>
